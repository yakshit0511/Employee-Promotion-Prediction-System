<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Promotion Prediction System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>🎯 Employee Promotion Prediction System</h1>
                <p>Predict employee promotion eligibility using machine learning</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-wrapper">
                <!-- Input Form -->
                <section class="form-section">
                    <div class="card">
                        <h2>📝 Employee Information</h2>
                        <form id="predictionForm" class="prediction-form">
                            <div class="form-grid">
                                <!-- Age -->
                                <div class="form-group">
                                    <label for="age">Age (years)</label>
                                    <input type="number" id="age" name="age" min="18" max="70" placeholder="Enter age (e.g., 35)" required>
                                </div>

                                <!-- Department -->
                                <div class="form-group">
                                    <label for="department">Department</label>
                                    <select id="department" name="department" required>
                                        <option value="">-- Select Department --</option>
                                        <option value="0">Sales & Marketing</option>
                                        <option value="1">Operations</option>
                                        <option value="2">Technology</option>
                                        <option value="3">Finance</option>
                                        <option value="4">HR</option>
                                    </select>
                                </div>

                                <!-- Previous Year Rating -->
                                <div class="form-group">
                                    <label for="previous_year_rating">Previous Year Rating</label>
                                    <select id="previous_year_rating" name="previous_year_rating" required>
                                        <option value="">-- Select Rating (1-5) --</option>
                                        <option value="1">1 - Poor</option>
                                        <option value="2">2 - Below Average</option>
                                        <option value="3">3 - Average</option>
                                        <option value="4">4 - Good</option>
                                        <option value="5">5 - Excellent</option>
                                    </select>
                                </div>

                                <!-- Length of Service -->
                                <div class="form-group">
                                    <label for="length_of_service">Length of Service (years)</label>
                                    <input type="number" id="length_of_service" name="length_of_service" 
                                           min="0" max="50" placeholder="Enter years (e.g., 5)" required>
                                </div>

                                <!-- KPIs Met -->
                                <div class="form-group">
                                    <label for="kpis_met">KPIs Met >80%</label>
                                    <select id="kpis_met" name="kpis_met" required>
                                        <option value="">-- Yes or No --</option>
                                        <option value="0">No</option>
                                        <option value="1">Yes</option>
                                    </select>
                                </div>

                                <!-- Awards Won -->
                                <div class="form-group">
                                    <label for="awards_won">Awards Won</label>
                                    <input type="number" id="awards_won" name="awards_won" min="0" max="10" placeholder="Enter number (e.g., 2)" required>
                                </div>

                                <!-- Average Training Score -->
                                <div class="form-group">
                                    <label for="avg_training_score">Avg Training Score (0-100)</label>
                                    <input type="number" id="avg_training_score" name="avg_training_score" 
                                           min="0" max="100" placeholder="Enter score (e.g., 85)" required>
                                </div>

                                <!-- Number of Trainings -->
                                <div class="form-group">
                                    <label for="no_of_trainings">Number of Trainings Completed</label>
                                    <input type="number" id="no_of_trainings" name="no_of_trainings" 
                                           min="0" max="20" placeholder="Enter count (e.g., 4)" required>
                                </div>

                                <!-- Hidden fields for model compatibility (set to default values) -->
                                <input type="hidden" id="region" name="region" value="0">
                                <input type="hidden" id="education" name="education" value="0">
                                <input type="hidden" id="gender" name="gender" value="0">
                                <input type="hidden" id="recruitment_channel" name="recruitment_channel" value="0">
                            </div>

                            <!-- Buttons -->
                            <div class="form-actions">
                                <button type="submit" class="btn btn-predict">🚀 Predict Promotion</button>
                                <button type="button" class="btn btn-secondary" onclick="loadSampleData()">📋 Sample</button>
                                <button type="reset" class="btn btn-secondary">🔄 Clear</button>
                            </div>
                        </form>
                    </div>
                </section>

                <!-- Results Section -->
                <section class="results-section">
                    <div class="card">
                        <h2>📊 Prediction Results</h2>
                        <div id="resultsContainer" class="results-placeholder">
                            <p>Fill the form and click "Predict Promotion" to see results here</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>🤖 Powered by XGBoost ML Model | Accuracy: 96.5% | © 2026</p>
        </footer>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner" style="display: none;">
        <div class="spinner"></div>
        <p>Predicting...</p>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
